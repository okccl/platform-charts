app:
  name: sample-frontend
  version: "1.0.0"
image:
  repository: ghcr.io/ccl-labs/sample-frontend
  tag: latest
  pullPolicy: IfNotPresent
replicaCount: 2
containerPort: 80
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi
probes:
  liveness:
    path: /
    initialDelaySeconds: 5
    periodSeconds: 10
  readiness:
    path: /
    initialDelaySeconds: 5
    periodSeconds: 5
ingress:
  enabled: true
  host: sample-frontend.localhost
hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70
serviceMonitor:
  enabled: false
db:
  name: ""
