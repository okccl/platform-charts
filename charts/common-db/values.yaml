db:
  enabled: true
  # DB名（アプリ名と合わせることを推奨）
  name: ""
  # PostgreSQLインスタンス数（1=シングル、2以上=HA構成）
  instances: 1
  # PostgreSQLバージョン
  postgresVersion: 17
  # ストレージサイズ
  storageSize: 1Gi
  # ストレージクラス（PVC削除後もデータを保持する Retain ポリシーを使用）
  storageClassName: "local-path-retain"
  # DB初期化設定
  database: app
  owner: app
  # DR リストア設定（通常は false。make generate-dr-manifests が自動設定する）
  recovery:
    enabled: false
    # externalClusters の name と source に対応するキー
    source: minio-backup
    endpointURL: "http://host.k3d.internal:9000"
    bucketName: "cnpg-backup"
    secretName: "minio-backup-secret"
    # 旧バックアップの参照先 serverName（空 = db.name をデフォルトとして使用）
    # generate-dr-manifests が自動設定する
    serverName: ""
  # バックアップ設定
  backup:
    enabled: true
    # MinIOのエンドポイント（k3d ホストからアクセス）
    endpointURL: "http://host.k3d.internal:9000"
    bucketName: "cnpg-backup"
    # MinIO認証情報を持つSecretの名前
    secretName: "minio-backup-secret"
    # WAL 書き込み先 serverName（空 = db.name をデフォルトとして使用）
    # generate-dr-manifests が DR 時に {db.name}-{YYYYMMDD} に設定する
    serverName: ""
  # モニタリング設定
  monitoring:
    enablePodMonitor: true
  # リソース設定
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
