app:
  name: sample-app
  version: "1.0.0"
image:
  repository: ghcr.io/okccl/sample-backend
  tag: latest
  pullPolicy: IfNotPresent
replicaCount: 1
containerPort: 8000
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
probes:
  liveness:
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 10
  readiness:
    path: /health
    initialDelaySeconds: 5
    periodSeconds: 5
ingress:
  enabled: true
  host: sample-backend.localhost
hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 70
serviceMonitor:
  enabled: true
  path: /metrics
  interval: 30s
db:
  name: sample-app-db
  instances: 1
  postgresVersion: 17
  storageSize: 1Gi
  database: app
  owner: app
  backup:
    enabled: false
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
